# GitLab CI snippet — add to .gitlab-ci.yml in the client repo.
# Runs the customer-doc sync command when roadmap.csv or plans change on the default branch.
#
# Required CI/CD variables (Settings → CI/CD → Variables, mark as Masked):
#   NOTION_API_KEY
#   GOOGLE_SA_KEY              (base64-encoded service-account JSON)
#   MICROSOFT_OAUTH_CLIENT_ID
#   MICROSOFT_OAUTH_TENANT_ID
#   MICROSOFT_OAUTH_REFRESH_TOKEN

sync-customer-docs:
  image: oven/bun:1
  stage: deploy
  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
      changes:
        - "customer-docs/**/roadmap.csv"
        - "customer-docs/**/plans/**"
  before_script:
    - bun install --frozen-lockfile --ignore-scripts
    - |
      printf '%s' "$GOOGLE_SA_KEY" | base64 -d > /tmp/google-sa.json
      chmod 600 /tmp/google-sa.json
      export GOOGLE_SERVICE_ACCOUNT_KEY_PATH=/tmp/google-sa.json
  script:
    - |
      CHANGED=$(git diff --name-only $CI_COMMIT_BEFORE_SHA $CI_COMMIT_SHA \
        | grep -E '^customer-docs/.+/(roadmap\.csv|plans/.+\.md)$' \
        | tr '\n' ',' | sed 's/,$//')
      bun run sync-customer-docs \
        --changed-files "$CHANGED"
  variables:
    GIT_DEPTH: 2
