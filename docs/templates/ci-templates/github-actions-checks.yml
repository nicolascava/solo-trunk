# Canonical CI checks — lint · style · type · test
#
# Drop this file into .github/workflows/ in the customer repo.
# Four independent parallel jobs run on every PR and merge-queue entry.
#
# SWAP points are marked with "# SWAP:" — edit only those lines for a
# non-house-stack repo (different package manager, test runner, etc.).
#
# House stack: pnpm 10.28.2 · Turborepo 2.8.20 · Node 24

name: Checks

on:
  pull_request:
  merge_group:

# Least-privilege baseline. Each job inherits this and cannot escalate it
# without an explicit permissions: block at the job level.
permissions:
  contents: read

# Cancel in-progress runs for the same workflow+ref when a new push arrives.
# Keeps queues short and avoids billing for superseded commits.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:

  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1

      - uses: pnpm/action-setup@a15d269cd4658e1107c09f1fabf4cbd7bd1f308a  # v4.4.0
        with:
          version: 10.28.2  # SWAP: match packageManager field in root package.json

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4.4.0
        with:
          node-version-file: .nvmrc  # SWAP: or pin node-version: '24.x' if no .nvmrc
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile  # SWAP: npm ci / yarn install --immutable

      - name: Lint
        run: pnpm lint  # SWAP: npm run lint / yarn lint
        env:
          NODE_OPTIONS: --max-old-space-size=4096
          # SWAP: uncomment to enable Turborepo remote cache
          # TURBO_TEAM: ${{ secrets.TURBO_TEAM }}
          # TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}

  style:
    name: Style
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1

      - uses: pnpm/action-setup@a15d269cd4658e1107c09f1fabf4cbd7bd1f308a  # v4.4.0
        with:
          version: 10.28.2

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4.4.0
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      # Style is enforced through ESLint @stylistic rules in this stack.
      # pnpm format:check is an alias for pnpm lint.
      # SWAP: replace with `pnpm dlx prettier --check .` or `pnpm dlx biome check .`
      # when adopting a dedicated formatter.
      - name: Style check
        run: pnpm format:check
        env:
          NODE_OPTIONS: --max-old-space-size=4096

  typecheck:
    name: Type check
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1

      - uses: pnpm/action-setup@a15d269cd4658e1107c09f1fabf4cbd7bd1f308a  # v4.4.0
        with:
          version: 10.28.2

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4.4.0
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      # Build first — tsc dependsOn: ["^build"] in turbo.json,
      # so incremental outputs must exist before the type pass.
      - name: Build
        run: pnpm build  # SWAP: remove if your tsconfig does not depend on build output

      - name: Type check
        run: pnpm tsc  # SWAP: npm run typecheck / tsc --noEmit
        env:
          # SWAP: uncomment to enable Turborepo remote cache
          # TURBO_TEAM: ${{ secrets.TURBO_TEAM }}
          # TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}

  test:
    name: Test
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1

      - uses: pnpm/action-setup@a15d269cd4658e1107c09f1fabf4cbd7bd1f308a  # v4.4.0
        with:
          version: 10.28.2

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4.4.0
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      # Build first — test dependsOn: ["^build"] in turbo.json.
      - name: Build
        run: pnpm build  # SWAP: remove if tests run without a prior build step

      # The house stack mixes Vitest (app packages) and bun test (scripts/tools).
      # Installing bun globally ensures both runners are available.
      # SWAP: remove the bun install step and replace pnpm turbo run test
      # with `pnpm test` if your repo uses a single test runner.
      - name: Install Bun (for bun:test packages)
        uses: oven-sh/setup-bun@4bc04d37a750122a420985ada21198f5743458b5  # v2.0.1
        # SWAP: remove this step if repo uses only Vitest or only bun

      - name: Test
        run: pnpm turbo run test  # SWAP: pnpm test / vitest run / bun test
        env:
          # SWAP: uncomment to enable Turborepo remote cache
          # TURBO_TEAM: ${{ secrets.TURBO_TEAM }}
          # TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}

  # Regenerates the coverage badge in README.md on every merge to main.
  # Runs only when the workflow is triggered by a push (not a PR), so add a
  # separate on.push trigger for main when using this job.
  #
  # SWAP: remove this job if the repo does not use the coverage-in-README practice.
  # See the testing standards guide for setup instructions.
  coverage-readme:
    name: Coverage README
    # SWAP: keep or remove depending on whether you want coverage on PRs
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write  # needed to push the updated README

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1

      - uses: pnpm/action-setup@a15d269cd4658e1107c09f1fabf4cbd7bd1f308a  # v4.4.0
        with:
          version: 10.28.2

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4.4.0
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install Bun  # SWAP: remove if repo has no Bun-runtime packages
        uses: oven-sh/setup-bun@4bc04d37a750122a420985ada21198f5743458b5  # v2.0.1

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Run vitest coverage
        run: pnpm turbo test:coverage
        env:
          # SWAP: uncomment to enable Turborepo remote cache
          # TURBO_TEAM: ${{ secrets.TURBO_TEAM }}
          # TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}

      # SWAP: remove if repo has no Bun-runtime packages
      - name: Run bun test coverage for Bun-runtime packages
        run: |
          bun test \
            --coverage \
            --coverage-reporter=lcov \
            --coverage-dir tooling/coverage \
            tooling/src

      - name: Regenerate README coverage block
        run: bun run coverage:readme  # SWAP: command that regenerates README coverage

      - name: Commit updated README if changed
        run: |
          if git diff --quiet README.md; then
            echo "README.md is already up to date."
          else
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add README.md
            git commit -m "Update coverage badge in README"
            git push
          fi
